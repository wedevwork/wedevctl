name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'

      - name: Verify dependencies
        run: go mod verify

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Please run 'go fmt ./...'"
            gofmt -s -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.11.4/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.4
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run golangci-lint
        # golangci-lint auto-detects .golangci.yml in the repo root; this run
        # also executes gosec (enabled in .golangci.yml) and is the blocking
        # lint + security gate. A real finding here fails the job.
        run: golangci-lint run --timeout=5m

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check test coverage
        run: |
          # Coverage gate: ≥80% overall and ≥80% for every package
          # (matches CLAUDE.md / .claude/workflow.md Rule 2).
          THRESHOLD=80.0
          fail=0

          overall=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "📊 Overall coverage: ${overall}%"
          if (( $(echo "$overall < $THRESHOLD" | bc -l) )); then
            echo "❌ Overall coverage ${overall}% is below required ${THRESHOLD}%"
            fail=1
          fi

          for pkg in cmd wedev util; do
            go test -coverprofile=${pkg}_coverage.out ./${pkg}/... > /dev/null 2>&1
            cov=$(go tool cover -func=${pkg}_coverage.out 2>/dev/null | grep total | awk '{print $3}' | sed 's/%//')
            echo "📊 ${pkg}/ package coverage: ${cov:-(none)}%"
            if [ -z "$cov" ]; then
              echo "❌ Failed to get ${pkg}/ coverage"
              fail=1
              continue
            fi
            if (( $(echo "$cov < $THRESHOLD" | bc -l) )); then
              echo "❌ ${pkg}/ coverage ${cov}% is below required ${THRESHOLD}%"
              fail=1
            fi
          done

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "✅ All coverage requirements met (≥${THRESHOLD}% overall and per package)"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'

      - name: Build binary
        run: go build -v -o wedevctl main.go

      - name: Verify binary
        run: ./wedevctl --help

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'

      # gitleaks: secret/credential scanner. Blocking — a committed private key,
      # token, or .env must fail the build (closes the gap that gosec/govulncheck
      # do not cover). We run the open-source binary directly instead of
      # gitleaks-action, which requires a paid license for organizations.
      - name: Run gitleaks secret scan
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          gitleaks detect --source . --redact --no-banner

      # gosec: static analysis of our own source code. Runs with -no-fail
      # here (reporting only); golangci-lint also runs gosec and is the
      # blocking code-security gate.
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out results.sarif ./...'

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        continue-on-error: true

      # govulncheck: checks dependencies AND the Go stdlib/toolchain for
      # known CVEs (with reachability analysis). This step IS allowed to
      # fail the build — a known CVE in a dependency is actionable.
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # This job ensures all checks pass before merge
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [static-analysis, test, build, security-scan]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.static-analysis.result }}" != "success" ]]; then
            echo "Static analysis failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Tests failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build failed"
            exit 1
          fi
          if [[ "${{ needs.security-scan.result }}" != "success" ]]; then
            echo "Security scan failed"
            exit 1
          fi
          echo "✅ All checks passed! PR is ready to merge."
          echo ""
          echo "Summary:"
          echo "  ✅ Static Analysis - Passed"
          echo "  ✅ Test Suite - Passed"
          echo "  ✅ Build Check - Passed"
          echo "  ✅ Security Scan - Passed"
